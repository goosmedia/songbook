---
layout: default
title: Song
---
<article class="song" id="song-container">
  <div class="song-header">
    <h1 class="song-title" id="song-title">Loading...</h1>
    <p class="song-artist" id="song-artist"></p>
    <div class="song-meta" id="song-meta"></div>
  </div>

  <div class="song-content">
    <pre id="song-content">Loading...</pre>
  </div>

  <div class="song-actions">
    <a href="./" class="back-link">← Back to Songbook</a>
  </div>
</article>

<script>
(function() {
  function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function parseYAMLFront(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (!match) return null;
    
    const yamlStr = match[1];
    const content = match[2];
    const data = {};
    
    yamlStr.split('\n').forEach(line => {
      const colonIndex = line.indexOf(':');
      if (colonIndex === -1) return;
      const key = line.substring(0, colonIndex).trim();
      let value = line.substring(colonIndex + 1).trim();
      
      if (value === 'true') value = true;
      else if (value === 'false') value = false;
      else if (!isNaN(value) && value !== '') value = parseInt(value, 10);
      else if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1);
      else if (value.startsWith("'") && value.endsWith("'")) value = value.slice(1, -1);
      
      data[key] = value;
    });
    
    return { meta: data, content: content };
  }

  function renderMetaTag(key, value) {
    if (typeof value === 'boolean') {
      return value ? `<span class="meta-tag ${key}">${key.charAt(0).toUpperCase() + key.slice(1)}</span>` : '';
    }
    if (key === 'readiness') {
      return `<span class="meta-tag readiness">Readiness: ${value}</span>`;
    }
    return '';
  }

  const filename = getQueryParam('f');
  if (!filename) {
    document.getElementById('song-title').textContent = 'Song not found';
    document.getElementById('song-content').textContent = 'No filename provided.';
    return;
  }

  fetch(`./songs/${filename}`)
    .then(r => {
      if (!r.ok) throw new Error('Song not found');
      return r.text();
    })
    .then(text => {
      const parsed = parseYAMLFront(text);
      if (!parsed) throw new Error('Invalid format');
      
      const { meta, content } = parsed;
      
      document.getElementById('song-title').textContent = meta.title || 'Untitled';
      document.getElementById('song-artist').textContent = meta.artist || '';
      document.getElementById('song-content').textContent = content;
      
      const metaContainer = document.getElementById('song-meta');
      Object.entries(meta).forEach(([key, value]) => {
        if (key !== 'title' && key !== 'artist' && key !== 'filename') {
          metaContainer.innerHTML += renderMetaTag(key, value);
        }
      });
      
      document.title = `${meta.title || 'Song'} - Songbook`;
    })
    .catch(err => {
      document.getElementById('song-title').textContent = 'Error loading song';
      document.getElementById('song-content').textContent = err.message;
    });
})();
</script>
