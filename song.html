---
layout: default
title: Song
---
<article class="song">
  <div class="song-header">
    <h1 class="song-title" id="song-title">Loading...</h1>
    <p class="song-artist" id="song-artist"></p>
    <div class="song-meta" id="song-meta"></div>
  </div>

  <div class="song-content">
    <pre id="song-content">Loading...</pre>
  </div>

  <div class="song-actions">
    <a href="./" class="back-link">← Back to Songbook</a>
  </div>
</article>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const filename = params.get('f');
  
  if (!filename) {
    document.getElementById('song-title').textContent = 'Song not found';
    document.getElementById('song-content').textContent = 'No filename provided.';
    return;
  }

  fetch('./songs/' + filename)
    .then(r => {
      if (!r.ok) throw new Error('Song not found');
      return r.text();
    })
    .then(text => {
      const parts = text.split(/^---$/m);
      if (parts.length < 3) {
        throw new Error('Invalid song format');
      }
      
      const yamlStr = parts[1].trim();
      const content = parts[2];
      
      const meta = {};
      yamlStr.split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.substring(0, idx).trim();
        let val = line.substring(idx + 1).trim();
        if (val === 'true') val = true;
        else if (val === 'false') val = false;
        else if (!isNaN(val) && val !== '') val = parseInt(val, 10);
        else if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
        else if (val.startsWith("'") && val.endsWith("'")) val = val.slice(1, -1);
        meta[key] = val;
      });
      
      document.getElementById('song-title').textContent = meta.title || 'Untitled';
      document.getElementById('song-artist').textContent = meta.artist || '';
      document.getElementById('song-content').textContent = content;
      
      const metaContainer = document.getElementById('song-meta');
      Object.entries(meta).forEach(([key, val]) => {
        if (key === 'piano' && val) metaContainer.innerHTML += '<span class="meta-tag piano">Piano</span>';
        if (key === 'guitar' && val) metaContainer.innerHTML += '<span class="meta-tag guitar">Guitar</span>';
        if (key === 'readiness') metaContainer.innerHTML += `<span class="meta-tag readiness">Readiness: ${val}</span>`;
      });
      
      document.title = `${meta.title || 'Song'} - Songbook`;
    })
    .catch(err => {
      document.getElementById('song-title').textContent = 'Error loading song';
      document.getElementById('song-content').textContent = err.message;
    });
})();
</script>
