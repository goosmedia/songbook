  "Yoshimi Battles The Pink Robots P. I" The Flaming Lips from "Yoshimi Battles The Pink Robots" tabbed by arlen b, 04/20/03 website: http://www.geocities.com/kingoftheeskimos  standard tuning  chords used:   C      Em     Dm     F      G    Fmaj7  Bmaugadd11   Am e-0------0------1------1------3------0--------0--------0--------------- B-1------0------3------1------3------1--------1--------1--------------- G-0------0------2------2------4------2--------0--------2--------------- D-2------2------0------3------5------3--------0--------2--------------- A-3------2-------------3------5-----(3)-------2--------0--------------- E--------0-------------1------3----------------------------------------  intro: C    Em    Dm    F  G  verse: C              Em     F                         G   Her name is Yoshimi - she's a black belt in karate  C                 Em   F                           G   Working for the city - she has to discipline her body            Fmaj7*            G            C         Bmaugadd11     F Cause she knows that it's demanding to defeat those   evil      machines  Fmaj7*               G       I know she can beat them   *you can just use a normal F here, but i like the major 7   chorus:      C                    Em             Dm                  F       G Oh Yoshimi - They don't believe me - But you won't let those robots defeat me       C                    Em             Dm                  F      G Oh Yoshimi - They don't believe me - But you won't let those robots eat me   verse: as before  Those evil natured robots - they're programmed to destroy us -  She's gotta be strong to fight them - So she's taking lots of vitamins -  Cause she knows that it'd be tragic if those evil robots win -  I know she can beat them

